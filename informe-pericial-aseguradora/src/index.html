<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe Pericial de Aseguradoras</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Formulario de Informe Pericial</h1>
        <form id="informeForm">
            <label for="nombreAsegurado">Nombre del Asegurado:</label>
            <input type="text" id="nombreAsegurado" name="nombreAsegurado" required>

            <label for="numeroPoliza">Número de Póliza:</label>
            <input type="text" id="numeroPoliza" name="numeroPoliza" required>

            <label for="fechaInforme">Fecha del Informe:</label>
            <input type="date" id="fechaInforme" name="fechaInforme" required>

            <label for="descripcion">Descripción del Caso:</label>
            <textarea id="descripcion" name="descripcion" required></textarea>

            <button type="submit">Generar Informe PDF</button>
        </form>
    </div>
    <script src="js/main.js"></script>
    <script src="js/pdf-generator.js"></script>
</body>
</html>
